name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Check formatting
        run: cargo fmt --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Build release
        run: cargo build --release --verbose

  python-tests:
    name: Python Tests (MCP Server)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('mcp-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./mcp-server
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-cov coverage
      
      - name: Run tests
        working-directory: ./mcp-server
        run: |
          pytest tests/ -v

      - name: Run tests with coverage
        working-directory: ./mcp-server
        run: |
          pytest tests/ -v --cov --cov-report=xml --cov-report=term-missing --no-cov-on-fail
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: hashFiles('mcp-server/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./mcp-server/coverage.xml
          flags: mcp-server
          name: mcp-server-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        if: hashFiles('mcp-server/coverage.xml') != ''
        working-directory: ./mcp-server
        run: |
          echo "## Python Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report generated for mcp-server/tests" >> $GITHUB_STEP_SUMMARY
          echo "Check Codecov for detailed coverage metrics." >> $GITHUB_STEP_SUMMARY
